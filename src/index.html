<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>George Kokkinis — Design Engineer</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Image preloading -->
    <link rel="preload" as="image" href="assets/images/car-cards/engine-106.png" type="image/png" fetchpriority="high" />
    <link rel="preload" as="image" href="assets/images/car-cards/106-interior.JPG" type="image/jpeg" fetchpriority="high" />
    <link rel="preload" as="image" href="assets/images/car-cards/strada-interior.png" type="image/png" fetchpriority="high" />
    <link rel="preload" as="image" href="assets/images/moodtune/happy.png" type="image/png" fetchpriority="high" />
    <link rel="preload" as="image" href="assets/images/moodtune/sad.png" type="image/png" fetchpriority="high" />
    <link rel="preload" as="image" href="assets/images/moodtune/angry.png" type="image/png" fetchpriority="high" />
    <link rel="preload" as="image" href="assets/images/moodtune/calm.png" type="image/png" fetchpriority="high" />
    <link rel="preload" as="image" href="assets/images/movie-posters/truants.webp" type="image/webp" />
    <link rel="preload" as="image" href="assets/images/movie-posters/the-skywalk-is-gone.webp" type="image/webp" />
    <link rel="preload" as="image" href="assets/images/movie-posters/nostalgia.webp" type="image/webp" />
    <link rel="preload" as="image" href="assets/images/movie-posters/hana-bi.webp" type="image/webp" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent FOUC: Apply theme before Angular loads -->
    <script>
      (function () {
        const theme =
          localStorage.getItem('theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
